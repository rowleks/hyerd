<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/style.css" />
        <script src="js/main.js" type="module"></script>
        <title>Hyerd | Home</title>
    </head>
    <body>
        <header class="p-5"></header>

        <main>
            <section
                class="relative flex items-center min-h-130 bg-primary overflow-hidden"
            >
                <div class="absolute inset-0">
                    <img
                        src="/images/hero-image.png"
                        alt=""
                        class="w-full h-full object-cover opacity-20"
                    />
                </div>
                <div class="wrapper relative z-10">
                    <h1 class="text-white mb-6 leading-tight">
                        Find Your <span class="text-accent">Dream Job</span>
                    </h1>
                    <p class="text-lg md:text-xl text-gray-300 max-w-2xl mb-8">
                        Browse thousands of job listings from top companies and
                        take the next step in your career.
                    </p>
                    <div class="flex flex-wrap gap-4">
                        <a
                            href="/jobs"
                            class="btn-accent px-6 py-3 rounded-full text-lg font-semibold inline-block"
                            >Get started</a
                        >
                    </div>
                </div>
            </section>

            <section class="wrapper my-12">
                <div class="flex items-center justify-between mb-6">
                    <h2>Latest Jobs</h2>
                    <a
                        href="/jobs"
                        class="text-accent font-semibold text-sm hover:underline"
                        >View all &rarr;</a
                    >
                </div>
                <div
                    id="job-cards-container"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"
                >
                    <!--Job card template-->
                    <template id="job-card-template">
                        <article id="job-card" class="job-card">
                            <div class="flex items-start justify-between mb-4">
                                <div
                                    id="company-logo"
                                    class="size-12 rounded-lg bg-emerald-100 flex items-center justify-center font-bold text-emerald-700 text-lg"
                                >
                                    <img src="" alt="" class="w-full h-full" />
                                </div>
                                <button
                                    id="bookmark-btn"
                                    class="text-gray-400 hover:text-accent transition-colors"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="20"
                                        height="20"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                    >
                                        <path
                                            d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"
                                        />
                                    </svg>
                                </button>
                            </div>
                            <h3 id="job-title" class="text-lg mb-1"></h3>
                            <p
                                id="company-name"
                                class="text-gray-500 text-sm mb-3"
                            ></p>
                            <div
                                class="flex items-center gap-3 text-xs text-gray-400 mb-3"
                            >
                                <span
                                    id="location-wrapper"
                                    class="flex items-center gap-1"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="14"
                                        height="14"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                    >
                                        <path
                                            d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"
                                        />
                                        <circle cx="12" cy="10" r="3" />
                                    </svg>
                                    <span id="job-location"></span>
                                </span>
                                <span
                                    id="salary-wrapper"
                                    class="flex items-center gap-1"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="14"
                                        height="14"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                    >
                                        <path d="M12 1v22" />
                                        <path
                                            d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"
                                        />
                                    </svg>
                                    <span id="job-salary"></span>
                                </span>
                            </div>
                            <div
                                id="job-tags"
                                class="flex flex-wrap gap-2 mb-4"
                            >
                                <span
                                    class="job-tag bg-primary/10 text-primary"
                                ></span>
                                <span
                                    class="job-tag bg-accent/10 text-accent"
                                ></span>
                            </div>
                            <div
                                id="footer-wrapper"
                                class="flex items-center justify-between text-xs text-gray-400"
                            >
                                <span id="job-date" class="capitalize"></span>
                                <a
                                    id="apply-link"
                                    href=""
                                    class="text-primary font-semibold hover:underline"
                                    target="_blank"
                                    >Apply now</a
                                >
                            </div>
                        </article>
                    </template>
                </div>
            </section>
        </main>

        <footer class="bg-primary text-gray-300 mt-20"></footer>
    </body>
</html>
